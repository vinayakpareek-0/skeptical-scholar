project:
  name: "skeptical-scholar"
  seed: 42

data:
  raw: "data/raw"
  processed: "data/processed"
  metadata: "data/metadata"
  db: "data/db"
  graph: "data/graph"

arxiv:
  base_url: "https://arxiv.org/abs/"
  queries:
    - "retrieval augmented generation LLM"
    - "transformer architecture attention mechanism"
    - "knowledge graph question answering"
    - "dense passage retrieval"
    - "natural language inference fact verification"
    - "uncertainty calibration language models"
    - "adversarial robustness NLP"
    - "multi-hop reasoning question answering"
  papers: 500
  max_results: 5
  download_delay: 5
  download_path: "data/raw/arxiv_papers"
  pdf_path: "data/raw/arxiv_papers/2603.02200v1.pdf"

chunking:
  min_length: 50
  max_length: 500
  overlap: 50

database:
  path: "data/db/arxiv.db"
  table_name: "arxiv_papers"

# retrieval

dense:
  model_name: "BAAI/bge-large-en-v1.5"
  index_path: "data/processed/dense_index.index"
  model_path: "data/processed/dense_model"

retrieval:
  reranker_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
