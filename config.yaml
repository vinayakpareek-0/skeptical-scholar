project:
  name: "skeptical-scholar"
  seed: 42

data:
  raw: "data/raw"
  processed: "data/processed"
  metadata: "data/metadata"
  db: "data/db"
  graph: "data/graph"

arxiv:
  base_url: "https://arxiv.org/abs/"
  queries:
    # Core RAG & Retrieval
    - "retrieval augmented generation hallucination detection"
    - "dense passage retrieval evaluation benchmark"
    - "cross encoder reranking information retrieval"
    # NLP & Verification
    - "fact verification natural language inference scientific"
    - "contradiction detection NLI scientific claims"
    - "text summarization abstractive extractive"
    - "named entity recognition zero shot"
    # Uncertainty & Calibration
    - "selective prediction abstention neural networks"
    - "calibrated confidence estimation language models"
    - "out of distribution detection deep learning"
    # Reasoning & QA
    - "knowledge grounded question answering"
    - "multi-hop reasoning question answering knowledge graph"
    - "chain of thought reasoning large language models"
    # Architecture & Models
    - "transformer attention mechanism self-attention"
    - "vision transformer robustness adversarial"
    - "graph neural network node classification"
    # Broader ML
    - "contrastive learning self-supervised representation"
    - "federated learning privacy preserving"
    - "reinforcement learning from human feedback RLHF"
    - "fairness bias mitigation machine learning"

  max_results: 10
  download_delay: 10
  download_path: "data/raw/arxiv_papers"

chunking:
  min_length: 50
  max_length: 500
  overlap: 50

database:
  path: "data/db/arxiv.db"
  table_name: "arxiv_papers"

# retrieval

dense:
  model_name: "BAAI/bge-large-en-v1.5"
  index_path: "data/processed/dense_index.index"
  model_path: "data/processed/dense_model"

retrieval:
  reranker_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  idk_threshold: 0.0

semantic_scholar:
  enabled: true
  queries:
    - "retrieval augmented generation"
    - "fact verification NLI"
    - "uncertainty quantification language models"
    - "adversarial robustness NLP"
    - "multi-hop question answering"
  max_results: 20
  min_citations: 10

generation:
  model: "llama-3.1-8b-instant"
  temperature: 0.3
  max_tokens: 512
  chunk_text_limit: 300
  confidence_labels:
    high: 0.7
    moderate: 0.4

nli:
  model_name: "cross-encoder/nli-deberta-v3-base"
  contradiction_threshold: 0.7
  reliability_threshold: 0.3

entity:
  model_name: "urchade/gliner_medium-v2.1"
  labels:
    - "model"
    - "dataset"
    - "metric"
    - "task"
    - "method"
  threshold: 0.3

idk:
  confidence_threshold: 0.1
  min_answer_words: 15
  hedge_count: 2

confidence:
  weights:
    retrieval: 0.3
    evidence_ratio: 0.3
    entity_overlap: 0.2
    contradiction_penalty: 0.2
